version: 2

builds:
  - main: .
    binary: cloudterminal
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "cloudterminal_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: cloudterminal
    repository:
      owner: tmyktmyc
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaser
      email: goreleaser@blinkingline.dev
    directory: Formula
    homepage: "https://github.com/tmyktmyc/BlinkingLine-cloudterminal"
    description: "Terminal multiplexer for Claude Code sessions"
    install: |
      bin.install "cloudterminal"
    test: |
      assert_match version.to_s, shell_output("#{bin}/cloudterminal --version")

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
